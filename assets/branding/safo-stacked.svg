  <!-- Slogan -->
  <text x="200" y="432" text-anchor="middle" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" font-weight="400" fill="#6DC36D" letter-spacing="1">Eat safe. Waste less.</text>
