<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="480" viewBox="0 0 400 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="480" fill="#1E2D4E" rx="32"/>

  <!-- Icon circle centered -->
  <circle cx="200" cy="170" r="110" fill="rgba(255,255,255,0.07)"/>

  <!-- Leaf left -->
  <ellipse cx="186" cy="148" rx="40" ry="58" fill="#4CAF72" opacity="0.95" transform="rotate(-18 186 148)"/>

  <!-- Leaf right -->
  <ellipse cx="218" cy="138" rx="30" ry="46" fill="#6DC36D" opacity="0.80" transform="rotate(18 218 138)"/>

  <!-- Highlight -->
  <ellipse cx="174" cy="132" rx="11" ry="24" fill="white" opacity="0.14" transform="rotate(-18 174 132)"/>

  <!-- Stem -->
  <line x1="200" y1="206" x2="200" y2="234" stroke="#A8E6C1" stroke-width="8" stroke-linecap="round"/>

  <!-- Checkmark -->
  <path d="M155 166 L186 200 L248 136" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark SAFO centered -->
  <text x="200" y="330" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="14">SAFO</text>

  <!-- Divider line -->
  <line x1="120" y1="356" x2="280" y2="356" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Tagline centered -->
